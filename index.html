<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#166534">
    <title>XDC FuelCheck • NSW</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        
        .map-container {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .station-row {
            transition: background-color 0.1s ease;
        }
        .station-row:active {
            background-color: #27251f;
        }
        
        @media (max-width: 768px) {
            .map-container { height: 380px !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-5xl mx-auto px-4">
        <!-- Header -->
        <div class="pt-6 pb-4 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-semibold title-font tracking-tighter">XDC FuelCheck</h1>
                <p class="text-zinc-400 text-sm">NSW Fuel Prices • With Your Discounts</p>
            </div>
            <div id="lastUpdated" class="text-xs px-3 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400">
                Loading data...
            </div>
        </div>

        <!-- Fuel Type Selector -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">Fuel Type</label>
            <select id="fuelType" onchange="updateRankedList()"
                    class="w-full md:w-64 bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                <option value="U91">U91 (Unleaded 91)</option>
                <option value="E10">E10</option>
                <option value="Diesel">Diesel</option>
                <option value="P95">P95</option>
                <option value="P98">P98</option>
            </select>
        </div>

        <!-- Map -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-2 px-1">
                <div class="font-semibold">Map View</div>
                <div id="visibleCount" class="text-xs px-3 py-1 bg-zinc-900 rounded-full text-zinc-400"></div>
            </div>
            <div id="map" class="map-container w-full h-[420px] md:h-[480px] bg-zinc-900 rounded-3xl"></div>
        </div>

        <!-- Ranked List -->
        <div class="mb-8">
            <div class="flex items-center justify-between mb-3 px-1">
                <div class="font-semibold">Cheapest Stations (Visible on Map)</div>
                <button onclick="updateRankedList()" 
                        class="text-xs px-4 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-2xl text-zinc-400">
                    Refresh List
                </button>
            </div>
            
            <div id="rankedList" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden max-h-[500px] overflow-y-auto">
            </div>
        </div>

        <!-- Discount Settings -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6">
            <h3 class="font-semibold mb-4 flex items-center gap-2">
                <span>💰</span> 
                <span>Your Discounts</span>
            </h3>
        
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">Brand</label>
                    <select id="discountBrand" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm"></select>
                </div>
        
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">Discount (¢/L)</label>
                    <input id="discountAmount" type="number" value="5" step="0.5" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                </div>
        
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">Label (optional)</label>
                    <input id="discountLabel" type="text" placeholder="e.g. NRMA, Work card" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                </div>
            </div>
        
            <button onclick="saveDiscount()" class="mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-6 py-3 rounded-2xl text-sm">
                Save Discount for this Brand
            </button>
        
            <div id="savedDiscountsPanel" class="mt-6">
                <h4 class="text-sm font-medium text-zinc-400 mb-2">Your Saved Discounts</h4>
                <div id="savedDiscountsList" class="space-y-2"></div>
            </div>
        </div>

        <!-- Display Currency Card -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-8">
            <h3 class="font-semibold mb-4 flex items-center gap-2">
                <span>🪙</span> 
                <span>Display Prices In</span>
            </h3>
            
            <select id="displayCurrency" onchange="updateRankedList()" 
                    class="w-full md:w-64 bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                <option value="AUD">AUD (Australian Dollars)</option>
                <option value="XDC">XDC</option>
                <option value="USDC">USDC (on XDC Network)</option>
            </select>
            
            <p class="text-xs text-zinc-500 mt-2">Prices will be converted using current market rates.</p>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-8 pb-8">
            Data updates hourly via GitHub Actions
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ==================== STATE ====================
        let allStations = [];
        let map;
        let markers = [];
        let savedDiscounts = [];
        let cryptoPrices = { XDC: 0, USDC: 0 }; // in AUD

        // ==================== MAP ====================
        function initMap() {
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([-33.8688, 151.2093], 10);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            map.on('moveend', updateRankedList);
            map.on('zoomend', updateRankedList);
        }

        function addMarkers(stationsToShow) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            stationsToShow.forEach(station => {
                const marker = L.marker([station.lat, station.lng]).addTo(map);
                markers.push(marker);
            });
        }

        // ==================== DATA LOADING ====================
        async function loadFuelData() {
            try {
                const response = await fetch('./data/fuel-prices.json');
                if (!response.ok) throw new Error('Data file not found');

                const data = await response.json();
                const stationsData = data.stations || [];
                const pricesData = data.prices || [];

                const priceMap = {};
                pricesData.forEach(p => {
                    const code = p.stationcode || p.code || p.stationCode;
                    if (!code) return;
                    if (!priceMap[code]) priceMap[code] = {};
                    const fuelType = p.fueltype || p.fuelType || p.type;
                    const priceValue = parseFloat(p.price || p.Price);
                    if (fuelType && priceValue) priceMap[code][fuelType] = priceValue;
                });

                allStations = stationsData
                    .filter(s => s.location && s.location.latitude && s.location.longitude)
                    .map((station, i) => {
                        const prices = priceMap[station.code] || {};
                        return {
                            id: i + 1,
                            brand: station.brand || 'Unknown',
                            name: station.name || station.address || 'Station',
                            lat: parseFloat(station.location.latitude),
                            lng: parseFloat(station.location.longitude),
                            prices: {
                                U91: prices.U91 || prices['U91'] || 180,
                                E10: prices.E10 || prices['E10'] || 177,
                                Diesel: prices.Diesel || prices['Diesel'] || 195,
                                P95: prices.P95 || prices['P95'] || 200,
                                P98: prices.P98 || prices['P98'] || 210
                            }
                        };
                    });

                if (data.lastUpdated) {
                    const date = new Date(data.lastUpdated);
                    document.getElementById('lastUpdated').textContent = 
                        `Updated: ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
                }

                const visibleStations = getVisibleStations();
                addMarkers(visibleStations);
                updateRankedList();

            } catch (error) {
                console.error('Failed to load fuel data:', error);
                document.getElementById('lastUpdated').textContent = 'Using sample data';
                allStations = [ /* sample data */ ];
                const visibleStations = getVisibleStations();
                addMarkers(visibleStations);
                updateRankedList();
            }
        }

        // ==================== CRYPTO PRICES ====================
        let cryptoPrices = { XDC: 0, USDC: 0 };

        async function loadCryptoPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=xdc-network,usd-coin&vs_currencies=aud');
                const data = await res.json();

                cryptoPrices.XDC = data['xdc-network']?.aud || 0.12;   // fallback
                cryptoPrices.USDC = data['usd-coin']?.aud || 1.52;     // fallback

                console.log('Crypto prices loaded:', cryptoPrices);
            } catch (e) {
                console.warn('Failed to fetch crypto prices. Using fallback values.');
                cryptoPrices.XDC = 0.12;
                cryptoPrices.USDC = 1.52;
            }
        }

        function convertToCrypto(audPrice, currency) {
            if (!audPrice || audPrice <= 0) return null;

            if (currency === 'XDC' && cryptoPrices.XDC > 0) {
                return (audPrice / cryptoPrices.XDC).toFixed(2);
            }
            if (currency === 'USDC' && cryptoPrices.USDC > 0) {
                return (audPrice / cryptoPrices.USDC).toFixed(2);
            }
            return null;
        }

        // ==================== DISCOUNT MANAGEMENT ====================
        function loadSavedDiscounts() {
            const saved = localStorage.getItem('fuelDiscounts');
            savedDiscounts = saved ? JSON.parse(saved) : [];
            renderSavedDiscounts();
        }

        function saveDiscount() {
            const brand = document.getElementById('discountBrand').value;
            const amount = parseFloat(document.getElementById('discountAmount').value);
            const label = document.getElementById('discountLabel').value.trim();

            if (!brand || !amount || amount <= 0) return alert("Please enter a valid discount.");

            savedDiscounts = savedDiscounts.filter(d => d.brand !== brand);
            savedDiscounts.push({ brand, amount, label: label || brand });
            localStorage.setItem('fuelDiscounts', JSON.stringify(savedDiscounts));
            renderSavedDiscounts();
            updateRankedList();
        }

        function deleteDiscount(brand) {
            savedDiscounts = savedDiscounts.filter(d => d.brand !== brand);
            localStorage.setItem('fuelDiscounts', JSON.stringify(savedDiscounts));
            renderSavedDiscounts();
            updateRankedList();
        }

        function renderSavedDiscounts() {
            const container = document.getElementById('savedDiscountsList');
            container.innerHTML = '';

            if (savedDiscounts.length === 0) {
                container.innerHTML = `<div class="text-xs text-zinc-500 px-2">No discounts saved yet.</div>`;
                return;
            }

            savedDiscounts.forEach(discount => {
                const div = document.createElement('div');
                div.className = `flex justify-between items-center bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-2 text-sm`;
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${discount.brand}</span>
                        <span class="text-emerald-400 ml-2">−${discount.amount}¢</span>
                        ${discount.label !== discount.brand ? `<span class="text-xs text-zinc-400 ml-2">(${discount.label})</span>` : ''}
                    </div>
                    <button onclick="deleteDiscount('${discount.brand}')" class="text-red-400 hover:text-red-500 text-xs px-3 py-1">Remove</button>
                `;
                container.appendChild(div);
            });
        }

        function getDiscountForBrand(brand) {
            return savedDiscounts.find(d => d.brand === brand);
        }

        function getEffectivePrice(station, fuelType) {
            const basePrice = station.prices[fuelType] || 180;
            const discount = getDiscountForBrand(station.brand);
            return discount ? Math.max(basePrice - discount.amount, 0) : basePrice;
        }

        // ==================== DYNAMIC BRAND DROPDOWN ====================
        function populateBrandDropdown() {
            const select = document.getElementById('discountBrand');
            const visibleStations = getVisibleStations();
            const brands = [...new Set(visibleStations.map(s => s.brand))].sort();

            select.innerHTML = '<option value="">Select brand...</option>';
            brands.forEach(brand => {
                const option = document.createElement('option');
                option.value = brand;
                option.textContent = brand;
                select.appendChild(option);
            });
        }

        function updateDiscountUI() {
            populateBrandDropdown();
        }

        // ==================== VISIBLE STATIONS ====================
        function getVisibleStations() {
            if (!map) return allStations;
            const bounds = map.getBounds();
            return allStations.filter(station => bounds.contains([station.lat, station.lng]));
        }

        // ==================== RANKED LIST ====================
        function updateRankedList() {
            const container = document.getElementById('rankedList');
            const fuelType = document.getElementById('fuelType').value;
            const displayCurrency = document.getElementById('displayCurrency').value;
            const visibleStations = getVisibleStations();

            document.getElementById('visibleCount').textContent = 
                `${visibleStations.length} stations visible`;

            if (visibleStations.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-zinc-400">No stations visible in current map area.</div>`;
                return;
            }

            // Sort stations by effective price (cheapest first)
            const sorted = [...visibleStations].sort((a, b) => {
                return getEffectivePrice(a, fuelType) - getEffectivePrice(b, fuelType);
            });

            container.innerHTML = '';

            sorted.slice(0, 20).forEach((station, index) => {
                const effectiveAUD = getEffectivePrice(station, fuelType);
                const originalAUD = station.prices[fuelType];
                const discount = getDiscountForBrand(station.brand);
                const cryptoValue = convertToCrypto(effectiveAUD, displayCurrency);

                // Create the row element
                const div = document.createElement('div');
                div.className = `station-row px-5 py-4 flex justify-between items-center border-b border-zinc-800 last:border-b-0 cursor-pointer`;

                let priceHTML = `
                    <div class="font-mono font-semibold ${discount ? 'text-emerald-400' : 'text-white'}">
                        ${effectiveAUD.toFixed(1)}¢ <span class="text-xs text-zinc-400">AUD</span>
                    </div>
                `;

                if (cryptoValue && displayCurrency !== 'AUD') {
                    priceHTML += `
                        <div class="text-emerald-400 text-xs mt-0.5">
                            ≈ ${cryptoValue} ${displayCurrency}
                        </div>
                    `;
                }

                if (discount) {
                    priceHTML += `<div class="text-[10px] text-emerald-400 line-through">${originalAUD}¢ AUD</div>`;
                }

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-6 text-center text-xs font-mono text-zinc-500">${index + 1}</div>
                        <div>
                            <div class="font-medium">${station.brand}</div>
                            <div class="text-xs text-zinc-400">${station.name}</div>
                        </div>
                    </div>
                    <div class="text-right">${priceHTML}</div>
                `;

                // Click to fly to station on map
                div.onclick = () => {
                    map.flyTo([station.lat, station.lng], 15, { duration: 0.8 });
                };

                container.appendChild(div);
            });
        }

        // ==================== INITIALIZATION ====================
        async function initializeApp() {
            initMap();
            await loadFuelData();
            await loadCryptoPrices();

            loadSavedDiscounts();

            map.on('moveend', updateDiscountUI);
            map.on('zoomend', updateDiscountUI);
            setTimeout(updateDiscountUI, 800);

            setTimeout(updateRankedList, 500);
        }

        window.onload = initializeApp;
    </script>
</body>
</html>

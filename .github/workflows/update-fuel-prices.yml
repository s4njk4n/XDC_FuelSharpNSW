name: Update NSW Fuel Prices

on:
  schedule:
    - cron: '0 * * * *'     # Every hour
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write           # ← This is required to push changes

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and save fuel prices
        env:
          API_KEY: ${{ secrets.NSW_FUEL_API_KEY }}
          API_SECRET: ${{ secrets.NSW_FUEL_API_SECRET }}
        run: node scripts/update-fuel-data.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fuel-prices.json
          git commit -m "Update fuel prices [$(date)]" || echo "No changes to commit"
          git push

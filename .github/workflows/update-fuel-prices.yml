name: Update NSW Fuel Prices

on:
  schedule:
    - cron: '0 * * * *'     # Every hour (UTC)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Reset to latest first, then run the script
      - name: Sync with latest changes
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Fetch and save fuel prices
        env:
          API_KEY: ${{ secrets.NSW_FUEL_API_KEY }}
          API_SECRET: ${{ secrets.NSW_FUEL_API_SECRET }}
        run: node scripts/update-fuel-data.js

      - name: Commit and push if there are changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/fuel-prices.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fuel prices [$(date)]"
            git push origin main
          fi

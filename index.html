<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#166534">
    <title>XDC FuelCheck • NSW</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        
        .map-container {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        .station-row {
            transition: background-color 0.1s ease;
        }
        .station-row:active {
            background-color: #27251f;
        }
        
        @media (max-width: 768px) {
            .map-container { height: 380px !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-5xl mx-auto px-4">
        <!-- Header -->
        <div class="pt-6 pb-4 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-semibold title-font tracking-tighter">XDC FuelCheck</h1>
                <p class="text-zinc-400 text-sm">NSW Fuel Prices • With Your Discounts</p>
            </div>
            <div id="lastUpdated" class="text-xs px-3 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400">
                Loading data...
            </div>
        </div>

        <!-- Discount Settings -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-5 mb-6">
            <h3 class="font-semibold mb-4 flex items-center gap-2">
                <span>💰</span> 
                <span>Your Discounts</span>
            </h3>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Fuel Type -->
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">Fuel Type</label>
                    <select id="fuelType" onchange="updateRankedList()"
                            class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                        <option value="U91">U91 (Unleaded 91)</option>
                        <option value="E10">E10</option>
                        <option value="Diesel">Diesel</option>
                        <option value="P95">P95</option>
                        <option value="P98">P98</option>
                    </select>
                </div>

                <!-- Brand Discount -->
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">Brand Discount</label>
                    <select id="discountBrand" onchange="updateDiscount()"
                            class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm">
                        <option value="">No Discount</option>
                        <option value="7-Eleven">7-Eleven</option>
                        <option value="Shell">Shell</option>
                        <option value="BP">BP</option>
                        <option value="Ampol">Ampol / Caltex</option>
                        <option value="United">United</option>
                        <option value="Puma">Puma</option>
                        <option value="Metro">Metro</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">Discount (¢ per litre)</label>
                    <input id="discountAmount" type="number" value="0" step="0.1" 
                           class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-4 py-3 text-sm"
                           onchange="updateDiscount()">
                </div>
            </div>
            <p class="text-xs text-zinc-500 mt-3">Discounts are applied to the selected fuel type.</p>
        </div>

        <!-- Map -->
        <div class="mb-6">
            <div class="flex items-center justify-between mb-2 px-1">
                <div class="font-semibold">Map View</div>
                <div id="visibleCount" class="text-xs px-3 py-1 bg-zinc-900 rounded-full text-zinc-400"></div>
            </div>
            <div id="map" class="map-container w-full h-[420px] md:h-[480px] bg-zinc-900 rounded-3xl"></div>
        </div>

        <!-- Ranked List -->
        <div>
            <div class="flex items-center justify-between mb-3 px-1">
                <div class="font-semibold">Cheapest Stations (Visible on Map)</div>
                <button onclick="updateRankedList()" 
                        class="text-xs px-4 py-2 bg-zinc-900 hover:bg-zinc-800 rounded-2xl text-zinc-400">
                    Refresh List
                </button>
            </div>
            
            <div id="rankedList" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden max-h-[500px] overflow-y-auto">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-8 pb-8">
            Data updates hourly via GitHub Actions • Prices shown include your selected discounts
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // ==================== STATE ====================
        let allStations = [];
        let map;
        let markers = [];
        let currentDiscount = { brand: '', amount: 0 };

        // ==================== MAP ====================
        function initMap() {
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([-33.8688, 151.2093], 10);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Update list when map moves or zooms
            map.on('moveend', updateRankedList);
            map.on('zoomend', updateRankedList);
        }

        function addMarkers(stationsToShow) {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            stationsToShow.forEach(station => {
                const marker = L.marker([station.lat, station.lng]).addTo(map);
                markers.push(marker);
            });
        }

        // ==================== DATA LOADING ====================
        async function loadFuelData() {
            try {
                const response = await fetch('./data/fuel-prices.json');
                
                if (!response.ok) throw new Error('Data file not found');

                const data = await response.json();

                const stationsData = data.stations || [];
                const pricesData = data.prices || [];

                // Create a map of prices by station code for fast lookup
                const priceMap = {};
                pricesData.forEach(p => {
                    const code = p.stationcode || p.code || p.stationCode;
                    if (!code) return;

                    if (!priceMap[code]) priceMap[code] = {};

                    const fuelType = p.fueltype || p.fuelType || p.type;
                    const priceValue = parseFloat(p.price || p.Price);

                    if (fuelType && priceValue) {
                        priceMap[code][fuelType] = priceValue;
                    }
                });

                // Build clean station objects with prices attached
                allStations = stationsData
                    .filter(s => s.location && s.location.latitude && s.location.longitude)
                    .map((station, i) => {
                        const prices = priceMap[station.code] || {};

                        return {
                            id: i + 1,
                            brand: station.brand || 'Unknown',
                            name: station.name || station.address || 'Station',
                            lat: parseFloat(station.location.latitude),
                            lng: parseFloat(station.location.longitude),
                            prices: {
                                U91: prices.U91 || prices['U91'] || 180,
                                E10: prices.E10 || prices['E10'] || 177,
                                Diesel: prices.Diesel || prices['Diesel'] || 195,
                                P95: prices.P95 || prices['P95'] || 200,
                                P98: prices.P98 || prices['P98'] || 210
                            }
                        };
                    });

                // Update last updated time
                const lastUpdatedEl = document.getElementById('lastUpdated');
                if (data.lastUpdated) {
                    const date = new Date(data.lastUpdated);
                    lastUpdatedEl.textContent = `Updated: ${date.toLocaleTimeString([], { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    })}`;
                }

                // Render
                const visibleStations = getVisibleStations();
                addMarkers(visibleStations);
                updateRankedList();

            } catch (error) {
                console.error('Failed to load fuel data:', error);
                document.getElementById('lastUpdated').textContent = 'Using sample data';

                // Fallback sample data
                allStations = [
                    { id: 1, brand: "7-Eleven", name: "Sydney CBD", lat: -33.8688, lng: 151.2093, prices: { U91: 179.9, E10: 177.9, Diesel: 199.9, P95: 199.9, P98: 209.9 } },
                    { id: 2, brand: "Shell", name: "Parramatta", lat: -33.8151, lng: 151.0034, prices: { U91: 181.9, E10: 179.9, Diesel: 195.9, P95: 201.9, P98: 211.9 } },
                    { id: 3, brand: "BP", name: "Chatswood", lat: -33.7969, lng: 151.1833, prices: { U91: 178.9, E10: 176.9, Diesel: 194.9, P95: 198.9, P98: 208.9 } }
                ];

                const visibleStations = getVisibleStations();
                addMarkers(visibleStations);
                updateRankedList();
            }
        }

        // ==================== DISCOUNT LOGIC ====================
        function updateDiscount() {
            const brand = document.getElementById('discountBrand').value;
            const amount = parseFloat(document.getElementById('discountAmount').value) || 0;
            
            currentDiscount = { brand, amount };
            updateRankedList();
        }

        function getEffectivePrice(station, fuelType) {
            const basePrice = station.prices[fuelType] || 180;
            
            if (currentDiscount.brand && station.brand === currentDiscount.brand) {
                return Math.max(basePrice - currentDiscount.amount, 0);
            }
            return basePrice;
        }

        // ==================== VISIBLE STATIONS ====================
        function getVisibleStations() {
            if (!map) return allStations;

            const bounds = map.getBounds();
            return allStations.filter(station => 
                bounds.contains([station.lat, station.lng])
            );
        }

        // ==================== RANKED LIST ====================
        function updateRankedList() {
            const container = document.getElementById('rankedList');
            const fuelType = document.getElementById('fuelType').value;
            const visibleStations = getVisibleStations();

            document.getElementById('visibleCount').textContent = 
                `${visibleStations.length} stations visible`;

            if (visibleStations.length === 0) {
                container.innerHTML = `<div class="p-6 text-center text-zinc-400">No stations visible in current map area.</div>`;
                return;
            }

            // Sort by effective price
            const sorted = [...visibleStations].sort((a, b) => {
                return getEffectivePrice(a, fuelType) - getEffectivePrice(b, fuelType);
            });

            container.innerHTML = '';

            sorted.slice(0, 20).forEach((station, index) => {
                const effectivePrice = getEffectivePrice(station, fuelType);
                const originalPrice = station.prices[fuelType];
                const hasDiscount = currentDiscount.brand && station.brand === currentDiscount.brand;

                const div = document.createElement('div');
                div.className = `station-row px-5 py-4 flex justify-between items-center border-b border-zinc-800 last:border-b-0 cursor-pointer`;
                
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-6 text-center text-xs font-mono text-zinc-500">${index + 1}</div>
                        <div>
                            <div class="font-medium">${station.brand}</div>
                            <div class="text-xs text-zinc-400">${station.name}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-mono font-semibold ${hasDiscount ? 'text-emerald-400' : 'text-white'}">
                            ${effectivePrice.toFixed(1)}¢
                        </div>
                        ${hasDiscount ? 
                            `<div class="text-[10px] text-emerald-400 line-through">${originalPrice}¢</div>` : 
                            `<div class="text-[10px] text-zinc-500">${originalPrice}¢</div>`
                        }
                    </div>
                `;

                div.onclick = () => {
                    map.flyTo([station.lat, station.lng], 15, { duration: 0.8 });
                };

                container.appendChild(div);
            });
        }

        // ==================== INITIALIZATION ====================
        async function initializeApp() {
            initMap();
            await loadFuelData();

            // Set initial discount values
            document.getElementById('discountAmount').addEventListener('input', updateDiscount);
            document.getElementById('fuelType').addEventListener('change', updateRankedList);
            document.getElementById('discountBrand').addEventListener('change', updateDiscount);

            // Initial list update
            setTimeout(updateRankedList, 500);
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
